services:
  - type: web
    name: priceright-api
    runtime: node
    rootDir: server
    plan: starter
    buildCommand: npm install
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        sync: false
      - key: AUTO_BACKUP_ENABLED
        value: "false"
